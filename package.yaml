name:                haskell-wifi-diagnostic
version:             0.1.0.0
github:              "peaceara777-star/haskell-wifi"
license:             MIT
author:              "peaceara777"
maintainer:          "peaceara777@github"
copyright:           "2024 peaceara777"

extra-source-files:
- README.md
- LICENSE

description:         أداة احترافية مكتوبة بلغة Haskell لتشخيص وإصلاح مشاكل الواي فاي. تدعم أنظمة Linux و Windows.

dependencies:
- base >= 4.7 && < 5
- text
- process
- directory
- filepath
- containers
- mtl
- exceptions
- bytestring
- aeson
- time

library:
  source-dirs: src
  exposed-modules:
    - WifiTypes
    - Diagnostics
    - RepairEngine
    - Platform.Linux
    - Platform.Windows
    - Utils.Command

executables:
  wifi-diagnostic:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    - -O2
    dependencies:
    - haskell-wifi-diagnostic

tests:
  wifi-diagnostic-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - haskell-wifi-diagnostic
    - hspec
    - QuickCheck

default-extensions:
  - OverloadedStrings
  - LambdaCase
  - DeriveGeneric
  - DeriveAnyClass
