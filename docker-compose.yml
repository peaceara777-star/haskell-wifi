version: '3.8'

services:
  wifi-diagnostic:
    build: .
    container_name: wifi-diagnostic
    network_mode: host
    privileged: true
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TERM=xterm-256color
    stdin_open: true
    tty: true
    command: --help

  # Development service with volume mounting
  dev:
    build:
      context: .
      target: builder
    container_name: wifi-diagnostic-dev
    network_mode: host
    privileged: true
    volumes:
      - .:/build
      - stack-work:/build/.stack-work
    working_dir: /build
    stdin_open: true
    tty: true
    command: bash

volumes:
  stack-work:
